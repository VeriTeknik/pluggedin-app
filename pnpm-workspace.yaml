# pnpm settings migrated from package.json's `pnpm` field, which pnpm 11+ no
# longer reads. Holds dependency overrides (security patches), build-script
# allowlist, supported architectures, and peer-dependency rules.

overrides:
  'esbuild@<=0.24.2': '>=0.25.0'
  'brace-expansion@>=1.0.0 <=1.1.11': '>=1.1.12'
  'brace-expansion@>=2.0.0 <2.0.3': '>=2.0.3 <3.0.0'
  'brace-expansion@>=4.0.0 <5.0.6': '>=5.0.6 <6.0.0'
  'prismjs@<1.30.0': '>=1.30.0'
  'axios@=1.10.0': '>=1.11.0'
  'js-yaml@>=4.0.0 <4.1.1': '>=4.1.1'
  'playwright@<1.55.1': '>=1.55.1'
  'qs@<6.15.2': '>=6.15.2'
  'tar@<7.5.11': '>=7.5.11'
  'fast-xml-parser@<5.3.5': '>=5.3.5'
  'minimatch@>=3.0.0 <3.1.3': '>=3.1.3 <4.0.0'
  'minimatch@>=9.0.0 <9.0.6': '>=9.0.6 <10.0.0'
  'minimatch@>=10.0.0 <10.2.3': '>=10.2.3 <11.0.0'
  'hono@<4.12.23': '>=4.12.23 <5.0.0'
  'ajv@>=8.0.0 <8.18.0': '>=8.18.0'
  'ajv@<6.14.0': '>=6.14.0 <7.0.0'
  'langsmith@<0.6.0': '>=0.6.0 <0.7.0'
  'fast-uri@<3.1.2': '>=3.1.2 <4.0.0'
  'ip-address@<10.1.1': '>=10.1.1 <11.0.0'
  'uuid@<11.1.1': '>=11.1.1 <12.0.0'
  'uuid@>=13.0.0 <13.0.1': '>=13.0.1 <14.0.0'
  '@isaacs/brace-expansion@<5.0.1': '>=5.0.1'
  'webpack@>=5.49.0 <5.104.1': '>=5.104.1'
  'rollup@>=4.0.0 <4.59.0': '>=4.59.0'
  'preact@>=10.28.0 <10.28.2': '>=10.28.2'
  'serialize-javascript@<7.0.5': '>=7.0.5'
  'path-to-regexp@>=2.0.0 <3.3.0': '>=3.3.0'
  'path-to-regexp@>=0.2.0 <1.9.0': '>=1.9.0'
  'path-to-regexp@>=8.0.0 <8.4.0': '>=8.4.0'
  'yaml@>=2.0.0 <2.7.1': '>=2.7.1'
  'picomatch@<4.0.4': '>=4.0.4'
  'flatted@<3.4.2': '>=3.4.2'
  '@hono/node-server@<1.19.13': '>=1.19.13 <2.0.0'
  'express-rate-limit@>=8.2.0 <8.2.2': '>=8.2.2'
  'underscore@<1.13.8': '>=1.13.8'
  '@xmldom/xmldom@<0.8.13': '>=0.8.13'
  'protobufjs@<7.5.8': '>=7.5.8 <8.0.0'
  'vite': '^7.3.2'
  'lodash@<4.18.0': '>=4.18.0 <5.0.0'
  'dompurify@<3.4.2': '>=3.4.2 <4.0.0'
  'postcss@<8.5.10': '>=8.5.10'
  'ws@>=8.0.0 <8.20.1': '>=8.20.1 <9.0.0'
  'smol-toml@<1.6.1': '>=1.6.1'

onlyBuiltDependencies:
  - '@zvec/zvec'
  - '@zvec/bindings-linux-x64'
  - '@zvec/bindings-linux-arm64'
  - '@zvec/bindings-darwin-arm64'
  - 'bcrypt'
  - 'esbuild'
  - 'sharp'

ignoredBuiltDependencies:
  - 'bcrypt'
  - 'esbuild'
  - 'sharp'

supportedArchitectures:
  os:
    - 'current'
    - 'linux'
    - 'darwin'
  cpu:
    - 'current'
    - 'x64'
    - 'arm64'

peerDependencyRules:
  allowedVersions:
    'react': '19'
    'react-dom': '19'
  ignoreMissing:
    - 'tree-sitter'

# Explicit build-script policy (pnpm 11). true = allowed to run lifecycle
# scripts; mirrors the original onlyBuiltDependencies allowlist.
allowBuilds:
  '@zvec/zvec': true
  bcrypt: true
  esbuild: true
  sharp: true
  '@sentry/cli': false
  canvas: false
  msw: false
  protobufjs: false
  unrs-resolver: false
